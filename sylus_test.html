<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N109区：白鸽的灰度光谱测试</title>
    <style>
        /* 全局样式设定：极简暗黑风、高级灰与暗红点缀 */
        :root {
            --bg-color: #0a0a0c;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent-red: #8b0000;
            --accent-red-hover: #a30000;
            --card-bg: rgba(25, 25, 28, 0.8);
            --border-color: #333;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "PingFang SC", "Microsoft YaHei", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        #app {
            width: 100%;
            max-width: 600px;
            padding: 30px;
            box-sizing: border-box;
        }

        /* 动画过渡 */
        .fade-in {
            animation: fadeIn 0.8s ease-in forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 隐藏区块 */
        .hidden { display: none !important; }

        /* 首页样式 */
        .start-screen {
            text-align: center;
        }
        .start-screen h1 {
            font-size: 24px;
            font-weight: normal;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #fff;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }
        .start-screen p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 40px;
        }

        /* 按钮通用样式 */
        .btn {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 15px 30px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 15px;
            text-align: left;
        }
        .btn-center { text-align: center; width: auto; min-width: 200px; }
        .btn:hover {
            border-color: var(--accent-red);
            background-color: rgba(139, 0, 0, 0.1);
        }

        /* 答题区样式 */
        .quiz-header {
            font-size: 12px;
            color: var(--accent-red);
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .question-title {
            font-size: 18px;
            margin-bottom: 30px;
        }
        .options-container {
            display: flex;
            flex-direction: column;
        }

        /* 结果区样式 */
        .result-screen {
            text-align: center;
            background: var(--card-bg);
            padding: 40px 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .result-title {
            font-size: 28px;
            color: var(--accent-red);
            margin-bottom: 10px;
            font-weight: bold;
        }
        .result-subtitle {
            font-size: 16px;
            color: #fff;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .result-desc {
            font-size: 14px;
            color: var(--text-muted);
            text-align: justify;
            margin-bottom: 30px;
        }
        .quote {
            font-style: italic;
            color: #d3d3d3;
            border-left: 3px solid var(--accent-red);
            padding-left: 15px;
            text-align: left;
            margin-bottom: 40px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div id="app">
    <!-- 首页 -->
    <div id="start-screen" class="start-screen fade-in">
        <h1>N109区：明暗光谱测试</h1>
        <p>在跨越那条清晰的明暗交界线后<br>等待我们的，是广阔自由的灰色。<br>自始至终，我们都在同一条光谱上。</p>
        <button class="btn btn-center" onclick="startQuiz()">跨越界限</button>
    </div>

    <!-- 答题区 -->
    <div id="quiz-screen" class="hidden">
        <div class="quiz-header" id="question-counter">01 / 10</div>
        <div class="question-title" id="question-text">加载中...</div>
        <div class="options-container" id="options-container">
            <!-- 选项将由JS动态生成 -->
        </div>
    </div>

    <!-- 结果区 -->
    <div id="result-screen" class="hidden">
        <div class="result-screen fade-in">
            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 10px;">你的光谱坐标</div>
            <div class="result-title" id="res-title">加载中...</div>
            <div class="result-subtitle" id="res-subtitle">加载中...</div>
            <div class="result-desc" id="res-desc">加载中...</div>
            <div class="quote" id="res-quote">加载中...</div>
            <button class="btn btn-center" onclick="location.reload()">重新测试</button>
        </div>
    </div>
</div>

<script>
    // --- 1. 题目数据 ---
    const questions = [
        {
            title: "【越界】你接到一份猎人协会的机密任务，需要潜入一个危险区域。在边界线，官方的通行证已经失效，你会如何进入？",
            options: [
                { text: "寻找一条可靠的走私客路线，按规矩支付通行费，低调且安全地进入。", order: 1, light: 1 },
                { text: "伪造一份该区域某个中型势力的身份证明，光明正大地骗过守卫。", order: 1, light: -1 },
                { text: "抛弃既定路线，凭借直觉和身手，从废弃且危险的地下排污系统潜入。", order: -1, light: 1 },
                { text: "故意在边界制造一场小规模的爆炸引发骚乱，趁乱大摇大摆地走进去。", order: -1, light: -1 }
            ]
        },
        {
            title: "【黑市】在地下交易市场，一份对你任务极其关键的机密情报正在被高价兜售。情报贩子要求你用猎人协会的内部机密来交换。",
            options: [
                { text: "拒绝交易，提出用等价的稀有芯核或赏金来作为替代筹码。", order: 1, light: 1 },
                { text: "假意答应，交给他一份经过你精心篡改、具有误导性的半真半假的机密。", order: 1, light: -1 },
                { text: "表面上放弃，但让梅菲斯特黑进他的设备把情报偷走，留下一段嘲讽的代码。", order: -1, light: 1 },
                { text: "拔出武器抵住他的咽喉：“情报归我了。如果你敢求救，你的命也归我。”", order: -1, light: -1 }
            ]
        },
        {
            title: "【竞拍】地下拍卖会上出现了一颗“高阶芯核”。一个地下雇佣兵也在疯狂竞价，他急需这颗芯核应对袭击他们营地的高危流浪体。你会：",
            options: [
                { text: "遵守拍卖规则正常竞价。如果拍下，亲自去帮他们营地清理流浪体。", order: 1, light: 1 },
                { text: "用绝对的财力碾压对方收入囊中。稀缺资源只配强者拥有，弱者的死活与你无关。", order: 1, light: -1 },
                { text: "退出竞拍让他拍下，然后暗中尾随他，确保他在赶回路上不被黑吃黑。", order: -1, light: 1 },
                { text: "随手抛出一枚高阶电磁干扰雷报废拍卖台能量罩，大方拿走芯核：“直接拿走最省事。”", order: -1, light: -1 }
            ]
        },
        {
            title: "【异变】你发现了一只高危变异流浪体，但它目前被困在一个非法角斗场的能量笼里，被当做赌博的工具。",
            options: [
                { text: "记录坐标并通知协会，同时暗中切断角斗场的电源，疏散无辜者。", order: 1, light: 1 },
                { text: "买下所有权，等它被其他野兽消耗得差不多了，再亲自收割它的高阶芯核。", order: 1, light: -1 },
                { text: "破坏笼子的控制台把它放出来，让它去掀翻这个非法的角斗场，自己再趁乱狩猎。", order: -1, light: 1 },
                { text: "摧毁控制台，在野兽出笼引发全场恐慌逃窜时，你逆着人群走向它享受高阶狩猎。", order: -1, light: -1 }
            ]
        },
        {
            title: "【背叛】你无意中查出，临空市一位素来威望极高的长官，竟然在暗中为暴力犯罪团伙提供资金和武器。",
            options: [
                { text: "收集确凿的证据，提交给最高仲裁庭，让他接受法律和公众的制裁。", order: 1, light: 1 },
                { text: "截留证据并以此作为把柄要挟这位长官，将他的资源转化为日后行动的筹码。", order: 1, light: -1 },
                { text: "把这个消息匿名卖给犯罪团伙的敌对势力，用“黑吃黑”的方式解决他。", order: -1, light: 1 },
                { text: "绕过警卫亲自去“拜访”。你不相信法庭的审判，你的武器就是他必须面对的判决。", order: -1, light: -1 }
            ]
        },
        {
            title: "【突发】你发现了一处EVER集团的隐秘实验基地。突发空间裂隙引来了流浪体潮，普通研究员正惊恐逃窜。此时你选择？",
            options: [
                { text: "启动救援封锁程序。优先保下研究员的命，没收实验数据并交由协会合法调查。", order: 1, light: 1 },
                { text: "拦下带头逃跑的主管，冷漠地要求他立刻交出核心密钥，作为救命的“交易筹码”。", order: 1, light: -1 },
                { text: "解决流浪体，砸烂实验设备，冷冷地看吓瘫的研究员：“换份工作，别再为EVER卖命。”", order: -1, light: 1 },
                { text: "对求救充耳不闻，越过人群解决流浪体。至于战斗破坏力会不会波及实验室，不在考虑范围内。", order: -1, light: -1 }
            ]
        },
        {
            title: "【猎物】你在追踪高危流浪体准备收割时，一个地下赏金猎人突然抢怪，但他错估了实力反被瞬间反制，陷入濒死。你会：",
            options: [
                { text: "严格执行救援条例，放弃击杀机会，先将那个抢怪的家伙救下来。", order: 1, light: 1 },
                { text: "计算好攻击前摇，等流浪体彻底撕裂那个赏金猎人露出破绽的瞬间，完成一击必杀。", order: 1, light: -1 },
                { text: "继续战斗精准走位，使攻击偏移让那蠢货不至于真死。等收拾完流浪体再看他的情况。", order: -1, light: 1 },
                { text: "站在一旁冷眼旁观。不管今天拿不拿得到战利品，都要让不自量力的人付出代价。", order: -1, light: -1 }
            ]
        },
        {
            title: "【战利品】你端掉了一个走私团伙的仓库，发现里面全是极度危险但能瞬间提升Evol爆发力的违禁药剂。",
            options: [
                { text: "联络猎人协会，将这些违禁品全部封存销毁，防止流入市场。", order: 1, light: 1 },
                { text: "通过暗点将这批货高价倒卖到其他街区，进一步丰富资金链。", order: 1, light: -1 },
                { text: "在仓库里埋满炸药点燃引线，邀请秦彻共同欣赏一场价值连城的“烟花秀”。", order: -1, light: 1 },
                { text: "留下纯度最高的带回暗点研究，剩余销毁。能变强的东西都值得一试。", order: -1, light: -1 }
            ]
        },
        {
            title: "【暗夜】外出任务时，所在街区突然产生帮派混战，难得在安全屋里迎来了一个平静的夜晚。你会如何度过？",
            options: [
                { text: "仔细保养武器，核对未来几天的行动路线，并检查安全屋的防御系统。", order: 1, light: 1 },
                { text: "推演如何在各方势力中周旋，利用混乱完成自己的任务目标。", order: 1, light: -1 },
                { text: "坐在屋顶边缘吹风，听着远处的枪声和电流声，感到莫名的自由。", order: -1, light: 1 },
                { text: "根本睡不着。你换上装备重新走入黑夜加入混战，寻找新的破局机会。", order: -1, light: -1 }
            ]
        },
        {
            title: "【无界】作为跨越了明暗交界线的白鸽，你终于看清了自己灵魂真正的底色：",
            options: [
                { text: "哪怕双翼沾染灰烬有些底线依然不可越过。你会在深渊里筑起不可动摇的准则。", order: 1, light: 1 },
                { text: "界限不过是弱者的借口。你已完美破译灰色地带残酷的法则，并懂地理智化为己用。", order: 1, light: -1 },
                { text: "无论光明牢笼还是黑暗枷锁都无法定义你。只需听从直觉，随时准备肆意妄为。", order: -1, light: 1 },
                { text: "彻底拥抱危险令人着迷。你放下了所有理性的克制，只想在沸腾的夜色里享受失控。", order: -1, light: -1 }
            ]
        }
    ];

    // --- 2. 结局数据 (九宫格映射) ---
    const resultsData = {
        "LG": { title: "坚定的引路者", subtitle: "提灯的白鸽", desc: "你带着底线与原则踏入暗区。即便身处混沌，你依然坚持自己的规矩——不掠夺，不伤害，只救赎。你是这片灰色光谱中最固执的光。", quote: "“在这儿讲规矩可是会吃亏的。不过……如果你非要固执到底，我倒不介意做你唯一的例外。”" },
        "NG": { title: "温柔的深渊", subtitle: "栖息于鸦翼的白鸽", desc: "你不受刻板规则的束缚，但内心始终向善。你接纳了暗区的残酷，也接纳了他所有的危险与残缺。你用纯粹的包容融化了黑白的分界线，成为了他唯一的归处。", quote: "“真危险啊……你明知道我是什么样的人，却偏偏要把这束光照进我的领地。”" },
        "CG": { title: "破晓的叛逆者", subtitle: "衔着荆棘的白鸽", desc: "你发现所谓的秩序只是弱者的枷锁。为了保护你想保护的事物，你毫不犹豫地撕裂规则，甚至不惜让羽毛染血。你终于学会了用獠牙和利爪去战斗。", quote: "“别用那种眼神看我，既然学会了亮出爪子，就别再回那个虚伪的笼子里去了。”" },
        "LN": { title: "冷酷的裁决者", subtitle: "停在枪膛的白鸽", desc: "越过界限后，你没有被混乱吞噬，反而成为了最冷静的观察者。感情与道德在你眼里都可以被放在天平上称量。你有你的铁律，连面对深渊都面不改色。", quote: "“又在算计什么呢，猎人小姐？不过，能把我也算进你的棋局，算你的本事。”" },
        "TN": { title: "混沌的暴风眼", subtitle: "风暴中的灰鸽", desc: "你不再纯白，也没有彻底变黑。你在光暗的交汇处，调和出了专属于你的完美灰色。你的选择全凭直觉，你是这片无垠光谱中最自由的变数。", quote: "“我喜欢不可控的东西。你就像一阵风，但我总有办法让你停在我的肩膀上。”" },
        "CN": { title: "狂舞的游离者", subtitle: "追逐残影的白鸽", desc: "底线？立场？你只追求极致的自由和当下的心跳。你在这个灰色的世界里肆意妄为，在乌鸦的领地里横冲直撞。享受着随时可能坠落的失重感。", quote: "“玩够了吗？既然你这么喜欢飞，不如看看……我的天空能不能装下你。”" },
        "LE": { title: "优雅的执棋者", subtitle: "披着鸦羽的白鸽", desc: "你比暗区的人更懂丛林法则，却披着文明的外衣。你用最优雅的姿态利用规则拿走想要的一切。你们是棋盘背后共同操纵一切的双生执棋者。", quote: "“想在我这里制定你的规矩？可以。不过，这盘棋，你得陪我下到最后。”" },
        "NE": { title: "暗夜的倒影", subtitle: "染上夜色的白鸽", desc: "道德与退路对你而言都已失去意义。你毫无保留地向深渊坠落，最终成为了他最完美的倒影。你们共享危险与秘密，是彼此唯一的同频者。", quote: "“既然已经沾染了我的颜色，就再也洗不掉了。留在我的视线里，哪里也不许去。”" },
        "CE": { title: "猩红的狂舞者", subtitle: "浴火振翅的白鸽", desc: "你根本不是来适应这片地带的，你是来把这里彻底点燃的。你骨子里流淌着对危险的极度渴望。你不是从属，而是与他在烈火中并肩狂舞的致命武器。", quote: "“（低笑声）这就兴奋起来了吗？好啊，那就让我看看，我们能把这场火烧得有多大。”" }
    };

    // --- 3. 核心逻辑 ---
    let currentIndex = 0;
    let scoreOrder = 0; // X轴：守序 vs 混乱
    let scoreLight = 0; // Y轴：微光 vs 深渊

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('quiz-screen').classList.add('fade-in');
        renderQuestion();
    }

    function renderQuestion() {
        const q = questions[currentIndex];
        document.getElementById('question-counter').innerText = `QA. ${currentIndex + 1} / 10`;
        document.getElementById('question-text').innerText = q.title;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn fade-in';
            btn.style.animationDelay = `${index * 0.1}s`;
            btn.innerText = opt.text;
            btn.onclick = () => selectOption(opt.order, opt.light);
            container.appendChild(btn);
        });
    }

    function selectOption(orderVal, lightVal) {
        scoreOrder += orderVal;
        scoreLight += lightVal;
        
        currentIndex++;
        if (currentIndex < questions.length) {
            // 简单重置动画效果
            document.getElementById('quiz-screen').classList.remove('fade-in');
            void document.getElementById('quiz-screen').offsetWidth; // 触发重绘
            document.getElementById('quiz-screen').classList.add('fade-in');
            renderQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        // 计算阵营 (-10 到 10 之间。大于2为正，小于-2为负，之间为中立)
        let xAxis = "";
        let yAxis = "";
        
        if (scoreOrder > 2) xAxis = "L"; // Lawful (守序)
        else if (scoreOrder < -2) xAxis = "C"; // Chaotic (混乱)
        else xAxis = "T"; // True Neutral (中立)
        
        if (scoreLight > 2) yAxis = "G"; // Good/Light (微光)
        else if (scoreLight < -2) yAxis = "E"; // Evil/Abyss (深渊)
        else yAxis = "N"; // Neutral (中立)
        
        // 修正代码匹配 (TN)
        let resultCode = xAxis + yAxis;
        if (resultCode === "TN") resultCode = "TN";
        else if (xAxis === "T") resultCode = "N" + yAxis;
        else if (yAxis === "N") resultCode = xAxis + "N";
        
        const finalData = resultsData[resultCode];
        
        document.getElementById('res-title').innerText = `【${finalData.title}】`;
        document.getElementById('res-subtitle').innerText = finalData.subtitle;
        document.getElementById('res-desc').innerText = finalData.desc;
        document.getElementById('res-quote').innerText = finalData.quote;
    }
</script>
